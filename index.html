<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KUMAO STUDY ROOM</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- 左 -->
    <div id="left">
      <h1 id="productName">KUMAO STUDY ROOM</h1>
      <div id="subTitle">集中する場所を選びな 😎💣</div>

      <!-- レアボイスボタン -->
      <button id="rareBtn" class="hidden" type="button">
        レアボイス当選！おめでとう🎉 押してみてね🐻✨
      </button>

      <!-- 集中 / 休憩用 -->
      <h2 id="modeTitle" class="hidden">集中TIME</h2>
      <div id="quote" class="hidden"></div>

      <!-- ring -->
      <div id="ringWrap" class="hidden">
        <svg class="ring" viewBox="0 0 120 120">
          <circle class="ring-bg" cx="60" cy="60" r="52"></circle>
          <circle class="ring-fg" cx="60" cy="60" r="52"></circle>
        </svg>
        <div id="timer">25:00</div>
      </div>

      <div id="lap" class="hidden">1周目</div>

      <div id="bears" class="hidden">
        <span class="bear">🐻</span>
        <span class="bear">🐻</span>
        <span class="bear">🐻</span>
        <span class="bear">🐻</span>
      </div>

      <!-- メニュー -->
      <div id="startMenu">
        <button class="modeBtn" onclick="startStudy('fire')">🔥　闘志の火を燃やす</button>
        <button class="modeBtn" onclick="startStudy('forest')">🌲　思考の森に入る</button>
        <button class="modeBtn" onclick="startStudy('sea')">🌊　静寂の海に沈む</button>
      </div>
    </div>

    <!-- 右 -->
    <div id="right">
      <!-- ドンくまお（開始・休憩で表示） -->
      <img id="character" src="don_space.png" alt="don kumao" />

      <!-- 右下クレジット（開始画面だけ表示） -->
      <div id="brandBox">
        <img id="goodayLogo" src="gooday.png" alt="Gooday logo" />
        <div id="poweredBy">Powered by Kumao Labo</div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>

<div id="studyRoom" style="position:fixed; right:10px; top:20px; z-index:9999; background:#222; color:#fff; padding:10px; border-radius:10px;">
  <div>🟢 自習室（<span id="roomCount">0</span>人）</div>
  <ul id="roomList"></ul>
  <button onclick="joinRoom()">入室</button>
  <button onclick="leaveRoom()">退出</button>

  
</div>
<button id="goStudyRoomBtn" 
style="position:fixed; left:20px; top:20px; z-index:9999;">
  自習室へ
</button>

<button id="backMainBtn" 
style="position:fixed; left:20px; top:60px; z-index:9999; display:none;">
  戻る
</button>

 <div id="studyRoomView" 
style="display:none; position:fixed; inset:0; background:#111; color:#fff; z-index:20000; padding:20px;">
  <button id="closeStudyRoomViewBtn" style="margin-bottom:20px;">← 元の画面に戻る</button>
  <h2>オンライン自習室</h2>

  <div id="roomButtons">
    <button onclick="enterRoom('Room1')">Room1（3人）</button>
    <button onclick="enterRoom('Room2')">Room2（5人）</button>
    <button onclick="enterRoom('Room3')">Room3（1人）</button>
  </div>

  <div id="roomDetail" style="margin-top:20px;"></div>

</div>
  
</body>
</html>
