<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン | KUMAO STUDY ROOM</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid #374151;
      border-radius: 18px;
      padding: 28px 22px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    .title {
      margin: 0 0 10px;
      font-size: 28px;
      font-weight: 700;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 22px;
      font-size: 14px;
      line-height: 1.7;
      color: #d1d5db;
      text-align: center;
    }

    .field {
      margin-bottom: 14px;
    }

    .label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 700;
      color: #f3f4f6;
    }

    .input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid #4b5563;
      background: #0b1220;
      color: #fff;
      font-size: 16px;
      outline: none;
    }

    .input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
    }

    .button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: #facc15;
      color: #111827;
      margin-top: 8px;
    }

    .button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .message {
      min-height: 24px;
      margin-top: 14px;
      font-size: 14px;
      line-height: 1.6;
      color: #d1d5db;
      text-align: center;
      white-space: pre-wrap;
    }

    .message.error {
      color: #fca5a5;
    }

    .message.success {
      color: #86efac;
    }

    .linkRow {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
      color: #d1d5db;
    }

    .linkRow a {
      color: #93c5fd;
      text-decoration: none;
      font-weight: 700;
    }

    .linkRow a:hover {
      text-decoration: underline;
    }

    .note {
      margin-top: 18px;
      font-size: 12px;
      line-height: 1.7;
      color: #9ca3af;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">ログイン</h1>
    <p class="subtitle">
      登録したメールアドレスとパスワードでログインしよう🐻✨
    </p>

    <div class="field">
      <label class="label" for="emailInput">メールアドレス</label>
      <input
        id="emailInput"
        class="input"
        type="email"
        placeholder="メールアドレスを入力"
        autocomplete="email"
      />
    </div>

    <div class="field">
      <label class="label" for="passwordInput">パスワード</label>
      <input
        id="passwordInput"
        class="input"
        type="password"
        placeholder="パスワードを入力"
        autocomplete="current-password"
      />
    </div>

    <button id="loginBtn" class="button" type="button">ログインする</button>

    <div id="messageBox" class="message"></div>

    <div class="linkRow">
      まだアカウントがない方は
      <a href="signup.html">新規登録へ</a>
    </div>

    <div class="note">
      ログイン後、表示名が未登録なら初回設定画面へ進みます。
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://jhsoakmlxbanbxlrhngb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_veO7IC4DhSERkOMfsBPpMA_57UeYuwO";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const loginBtn = document.getElementById("loginBtn");
    const messageBox = document.getElementById("messageBox");

    function showMessage(text, type = "") {
      messageBox.textContent = text;
      messageBox.className = "message";
      if (type) {
        messageBox.classList.add(type);
      }
    }

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    async function handleLogin() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email) {
        showMessage("メールアドレスを入力してね", "error");
        emailInput.focus();
        return;
      }

      if (!isValidEmail(email)) {
        showMessage("正しいメールアドレス形式で入力してね", "error");
        emailInput.focus();
        return;
      }

      if (!password) {
        showMessage("パスワードを入力してね", "error");
        passwordInput.focus();
        return;
      }

      try {
        loginBtn.disabled = true;
        showMessage("ログイン中です…");

        const { error } = await supabaseClient.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          showMessage("ログインできなかったよ: " + error.message, "error");
          return;
        }

        const {
          data: { session },
          error: sessionError
        } = await supabaseClient.auth.getSession();

        if (sessionError || !session) {
          showMessage("ログイン後の確認でエラーが起きたよ", "error");
          return;
        }

        const { data, error: profileError } = await supabaseClient
          .from("profiles")
          .select("display_name")
          .eq("id", session.user.id)
          .maybeSingle();

        if (profileError) {
          showMessage("プロフィール確認でエラーが起きたよ", "error");
          return;
        }

        showMessage("ログインできたよ😊 移動します。", "success");

        setTimeout(() => {
          if (data?.display_name) {
            window.location.href = "index.html";
          } else {
            window.location.href = "profile-setup.html";
          }
        }, 1000);
      } catch (e) {
        console.error(e);
        showMessage("ログイン中にエラーが起きたよ", "error");
      } finally {
        loginBtn.disabled = false;
      }
    }

    loginBtn.addEventListener("click", handleLogin);

    passwordInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        handleLogin();
      }
    });
  </script>
</body>
</html>
